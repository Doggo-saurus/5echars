services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: cb_duckdns
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ}"
      SUBDOMAINS: "${DUCKDNS_SUBDOMAIN}"
      TOKEN: "${DUCKDNS_TOKEN}"
      LOG_FILE: "false"
    volumes:
      - duckdns_config:/config
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.8-alpine
    container_name: cb_caddy
    depends_on:
      - duckdns
      - app
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    network_mode: host
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL

  app:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: cb_app
    environment:
      NODE_ENV: "production"
      HOST: "127.0.0.1"
      PORT: "3000"
      MANUAL_BASE_URL: "${MANUAL_BASE_URL:-https://link to your favourite 5e tools}"
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@127.0.0.1:6379"
    entrypoint: ["node"]
    command: ["src/index.js"]
    network_mode: host
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2-alpine
    container_name: cb_redis
    user: "${PUID:-1000}:${PGID:-1000}"
    command:
      - redis-server
      - --bind
      - 127.0.0.1
      - --dir
      - /data
      - --appendonly
      - "yes"
      - --appenddirname
      - appendonlydir
      - --save
      - "60 1000"
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --maxmemory-policy
      - noeviction
      - --protected-mode
      - "yes"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    network_mode: host
    volumes:
      - ./data/redis:/data
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  duckdns_config:
  caddy_data:
  caddy_config:
