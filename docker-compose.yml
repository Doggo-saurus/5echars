services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: cb_duckdns
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ}"
      SUBDOMAINS: "${DUCKDNS_SUBDOMAIN}"
      TOKEN: "${DUCKDNS_TOKEN}"
      LOG_FILE: "false"
    volumes:
      - duckdns_config:/config
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.8-alpine
    container_name: cb_caddy
    depends_on:
      - duckdns
      - app
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - backend

  app:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: cb_app
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: cb_redis
    command:
      - sh
      - -c
      - redis-server --appendonly yes --save 60 1000 --requirepass "$${REDIS_PASSWORD}" --maxmemory-policy noeviction --protected-mode yes
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

networks:
  edge:
  backend:
    internal: true

volumes:
  duckdns_config:
  caddy_data:
  caddy_config:
  redis_data:
